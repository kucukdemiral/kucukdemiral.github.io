<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFE Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']], processEscapes: true },
  svg: { fontCache: 'global' },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="page-shell">
  <header class="app-header">
    <div>
      <p class="eyebrow">Interactive Tool</p>
      <h1>Partial Fraction Decomposition</h1>
    </div>
    <div class="header-right">
      <span id="fs-display" class="fs-display"></span>
    </div>
  </header>

  <main class="app-grid">
    <section class="panel input-panel">
      <div class="input-row">
        <label class="input-label">Num</label>
        <input id="num-input" type="text" placeholder="e.g. 2" autocomplete="off" spellcheck="false">
        <label class="input-label">Den</label>
        <input id="den-input" type="text" placeholder="e.g. 1 8 17 10" autocomplete="off" spellcheck="false">
        <button id="btn-build" class="build-btn">Decompose</button>
      </div>
      <div class="presets-row">
        <span class="presets-label">Presets:</span>
        <div class="preset-btns" id="preset-btns"></div>
      </div>
    </section>

    <section class="panel display-panel">
      <div class="formula-bar" id="formula-bar"></div>
      <div class="main-display" id="main-display"></div>
    </section>

    <div class="bottom-row">
      <section class="panel controls-panel">
        <div class="anim-controls">
          <button id="btn-reset" class="ctrl-btn" title="Reset">&#8634;</button>
          <button id="btn-step-back" class="ctrl-btn" title="Step Back">&#9664;&#9664;</button>
          <button id="btn-play" class="ctrl-btn play-btn" title="Play">&#9654;</button>
          <button id="btn-step-fwd" class="ctrl-btn" title="Step Forward">&#9654;&#9654;</button>
          <button id="btn-skip" class="ctrl-btn" title="Show All">&#9654;|</button>
          <div class="speed-control">
            <label for="speed-slider">Speed</label>
            <input id="speed-slider" type="range" min="0" max="4" value="2">
          </div>
        </div>
      </section>
      <section class="panel results-panel">
        <div class="results-grid">
          <div class="result-card"><span class="result-label">Poles</span><span class="result-value" id="r-poles">&mdash;</span></div>
          <div class="result-card"><span class="result-label">Type</span><span class="result-value" id="r-type">&mdash;</span></div>
          <div class="result-card"><span class="result-label">Stable</span><span class="result-value" id="r-stable">&mdash;</span></div>
          <div class="result-card"><span class="result-label">Degree</span><span class="result-value" id="r-degree">&mdash;</span></div>
        </div>
      </section>
    </div>
  </main>
</div>
</body>
</html>
