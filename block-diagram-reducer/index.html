<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Diagram Reducer</title>
    <meta name="description" content="Interactive block diagram reducer with step-by-step simplification for control systems education." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260604-1" />
    <script src="app.js?v=20260604-1" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Interactive Tool</p>
          <h1>Block Diagram Reducer</h1>
        </div>
        <div id="status-badge" class="status-badge status-ready">Ready</div>
      </header>

      <div id="example-tabs" class="example-tabs"></div>

      <main class="app-grid">
        <section class="control-panel panel">
          <div class="panel-header">
            <h2>Controls</h2>
            <p>Step through the reduction or show the full solution at once.</p>
          </div>
          <button id="btn-step" class="btn btn-primary" type="button">Reduce Step</button>
          <button id="btn-all" class="btn btn-accent" type="button">Show All Steps</button>
          <button id="btn-reset" class="btn btn-secondary" type="button">Reset</button>
          <div id="step-counter" style="text-align:center; font-size:0.78rem; color:var(--ink-faint); margin-top:0.25rem;">Step 0 / 0</div>
        </section>

        <section class="diagram-panel panel">
          <div class="diagram-wrap">
            <div id="rule-badge" class="rule-badge"></div>
            <div id="diagram-plot" class="plot"></div>
          </div>
        </section>

        <section class="algebra-panel panel">
          <div class="panel-header">
            <h2>Reduction Steps</h2>
            <p>Each step shows the rule applied and the resulting expression.</p>
          </div>
          <ul id="step-list" class="step-list"></ul>
        </section>
      </main>
    </div>
  </body>
</html>
